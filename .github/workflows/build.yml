# .github/workflows/build.yml
name: Build Windows EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller customtkinter pillow requests ollama python-dotenv
        # Add your specific extra requirements here if any

    - name: Create Default Config
      run: |
        echo '{
          "mongo_uri": "mongodb+srv://mlbenchpvtltd:HDqDr62jK1vK50x9@cluster0.pdhd1qx.mongodb.net/Test",
          "db_name": "Test",
          "collection": "Book Data",
          "watch_mode": false,
          "interval": 30
        }' > backend_integration/sync_config.json

    - name: Build with PyInstaller
      run: |
        pyinstaller --noconfirm --onedir --windowed `
        --add-data "backend_integration/sync_config.json;." `
        --add-data "backend_integration/icons;icons" `
        --name "BookSync" `
        backend_integration/sync_app_clr_trae.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: BookSync-Portable
        path: dist/BookSync/
