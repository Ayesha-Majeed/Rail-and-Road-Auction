# .github/workflows/build.yml
name: Build Windows EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Requirements DesktopApp se install hongi
        pip install -r DesktopApp/requirements.txt pyinstaller
    
    - name: Create default config
      run: |
        # Config file DesktopApp ke andar generate hogi
        echo '{"mongo_uri":"mongodb+srv://mlbenchpvtltd:HDqDr62jK1vK50x9@cluster0.pdhd1qx.mongodb.net/Test","db_name":"Test","collection":"Book Data","watch_mode":false,"interval":30}' > DesktopApp/sync_config.json
    
    - name: Build EXE
      run: |
        # PyInstaller DesktopApp ke andar se script aur data uthaye ga
        pyinstaller --noconfirm --onedir --windowed --name "BookSync" `
        --add-data "DesktopApp/icons;icons" `
        --add-data "DesktopApp/sync_config.json;." `
        DesktopApp/sync_app_clr_trae.py
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4  # Fixed deprecation error
      with:
        name: BookSync-Windows-Portable
        path: dist/BookSync/
